apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: automarket-ingress
  namespace: automarket
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "15m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: demo.aidevcowork.com
      http:
        paths:
          # MinIO proxy — $1=/|empty $2=rest → strips /minio prefix
          - path: /minio(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: minio-svc
                port:
                  number: 9000
          # Backend routes — $1=empty $2=full path
          - path: /()(auth.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-svc
                port:
                  number: 3000
          - path: /()(vehicles.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-svc
                port:
                  number: 3000
          - path: /()(favorites.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-svc
                port:
                  number: 3000
          - path: /()(me.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-svc
                port:
                  number: 3000
          - path: /()(health|ready)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-svc
                port:
                  number: 3000
          - path: /()(admin-api.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-svc
                port:
                  number: 3000
          # Frontend SPA fallback
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
