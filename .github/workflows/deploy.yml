name: Deploy to GKE

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  REGISTRY: ${{ secrets.ARTIFACT_REGISTRY }}
  CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}
  REGION: ${{ secrets.GCP_REGION }}
  PROJECT: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Authenticate with GCP via Workload Identity Federation ──────────────────
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      # ── Configure Docker to push to Artifact Registry ───────────────────────────
      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # ── Build & push backend ─────────────────────────────────────────────────────
      - name: Build & push backend
        run: |
          docker build --platform linux/amd64 \
            -t $REGISTRY/backend:latest \
            -t $REGISTRY/backend:${{ github.sha }} \
            -f backend/Dockerfile backend/
          docker push $REGISTRY/backend:latest
          docker push $REGISTRY/backend:${{ github.sha }}

      # ── Build & push frontend ────────────────────────────────────────────────────
      - name: Build & push frontend
        run: |
          docker build --platform linux/amd64 \
            -t $REGISTRY/frontend:latest \
            -t $REGISTRY/frontend:${{ github.sha }} \
            -f frontend/Dockerfile frontend/
          docker push $REGISTRY/frontend:latest
          docker push $REGISTRY/frontend:${{ github.sha }}

      # ── Get GKE credentials ──────────────────────────────────────────────────────
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}
          project_id: ${{ env.PROJECT }}

      # ── Apply ConfigMap & update images ──────────────────────────────────────────
      - name: Apply ConfigMap
        run: kubectl apply -f k8s-gke/configmap.yaml

      - name: Apply Ingress
        run: kubectl apply -f k8s-gke/ingress.yaml

      - name: Update backend image
        run: |
          kubectl set image deployment/backend \
            backend=$REGISTRY/backend:${{ github.sha }} \
            -n automarket

      - name: Update frontend image
        run: |
          kubectl set image deployment/frontend \
            frontend=$REGISTRY/frontend:${{ github.sha }} \
            -n automarket

      # ── Wait for rollout ─────────────────────────────────────────────────────────
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend  -n automarket --timeout=5m
          kubectl rollout status deployment/frontend -n automarket --timeout=3m
