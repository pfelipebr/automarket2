name: Deploy to GKE

on:
  push:
    branches: [main]

# One deploy at a time; never cancel in progress (avoid partial rollouts)
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # Required for Workload Identity Federation

jobs:
  # ── Detect which services changed ────────────────────────────────────────────
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ── Build & push backend image ───────────────────────────────────────────────
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    outputs:
      image: ${{ steps.image.outputs.ref }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.ARTIFACT_REGISTRY }}/backend:latest
            ${{ secrets.ARTIFACT_REGISTRY }}/backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: image
        run: echo "ref=${{ secrets.ARTIFACT_REGISTRY }}/backend:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"

  # ── Build & push frontend image ──────────────────────────────────────────────
  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    outputs:
      image: ${{ steps.image.outputs.ref }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.ARTIFACT_REGISTRY }}/frontend:latest
            ${{ secrets.ARTIFACT_REGISTRY }}/frontend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: image
        run: echo "ref=${{ secrets.ARTIFACT_REGISTRY }}/frontend:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"

  # ── Deploy to GKE ─────────────────────────────────────────────────────────────
  deploy-to-gke:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend, build-frontend]
    # Run even if build jobs were skipped (k8s-only changes), but not on failure
    if: always() && !failure() && !cancelled()

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Apply ConfigMap
        run: kubectl apply -f k8s-gke/configmap.yaml

      - name: Update backend image
        if: needs.detect-changes.outputs.backend == 'true'
        run: |
          kubectl set image deployment/backend \
            backend=${{ secrets.ARTIFACT_REGISTRY }}/backend:sha-${{ github.sha }} \
            -n automarket

      - name: Update frontend image
        if: needs.detect-changes.outputs.frontend == 'true'
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ secrets.ARTIFACT_REGISTRY }}/frontend:sha-${{ github.sha }} \
            -n automarket

      - name: Wait for backend rollout
        if: needs.detect-changes.outputs.backend == 'true'
        run: kubectl rollout status deployment/backend -n automarket --timeout=5m

      - name: Wait for frontend rollout
        if: needs.detect-changes.outputs.frontend == 'true'
        run: kubectl rollout status deployment/frontend -n automarket --timeout=3m

      - name: Smoke test — health endpoint
        run: |
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://demo.aidevcowork.com/health)
            if [ "$status" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $status — retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 10 attempts"
          exit 1
