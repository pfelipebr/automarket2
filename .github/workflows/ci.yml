name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── Backend type-check ───────────────────────────────────────────────────────
  backend-checks:
    name: Backend — typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit

  # ── Frontend type-check ──────────────────────────────────────────────────────
  frontend-checks:
    name: Frontend — typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit

  # ── Backend integration tests (real Postgres + Redis) ────────────────────────
  backend-tests:
    name: Backend — tests
    runs-on: ubuntu-latest
    needs: backend-checks

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: automarket_test
          POSTGRES_USER: automarket
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://automarket:testpassword@localhost:5432/automarket_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-not-for-production
      JWT_EXPIRY: 15m
      REFRESH_TOKEN_EXPIRY: 30d
      NODE_ENV: test
      PORT: '3000'
      MINIO_ENDPOINT: localhost
      MINIO_PORT: '9000'
      MINIO_ACCESS_KEY: test
      MINIO_SECRET_KEY: test
      MINIO_BUCKET: test-bucket
      STORAGE_DRIVER: minio

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Enable PostgreSQL extensions (cube + earthdistance)
        run: |
          PGPASSWORD=testpassword psql \
            -h localhost -U automarket -d automarket_test \
            -c "CREATE EXTENSION IF NOT EXISTS cube;" \
            -c "CREATE EXTENSION IF NOT EXISTS earthdistance;"

      - name: Apply database schema
        run: npx prisma db push --accept-data-loss

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ── Frontend unit tests ──────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend — tests
    runs-on: ubuntu-latest
    needs: frontend-checks

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm test
