apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: automarket
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  # Estratégia de rollout: sobe novos pods antes de derrubar os antigos
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Nota: migrations são executadas pelo entrypoint.sh dentro do container
      # principal (quando usando a imagem real). O initContainer foi removido
      # para compatibilidade com a imagem placeholder.
      containers:
        - name: backend
          image: automarket-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: automarket-config
            - secretRef:
                name: automarket-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: automarket
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
