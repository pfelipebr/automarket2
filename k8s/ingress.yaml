apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: automarket-ingress
  namespace: automarket
  annotations:
    # Tamanho máximo de upload (para fotos dos veículos)
    nginx.ingress.kubernetes.io/proxy-body-size: "15m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # CORS — permite o frontend chamar o backend no mesmo domínio
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  rules:
    # Para kind local, usamos localhost.
    # Em produção, trocar por seu domínio real.
    - host: localhost
      http:
        paths:
          # API e autenticação → backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 3000
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 3000
          - path: /vehicles
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 3000
          - path: /favorites
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 3000
          - path: /me
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 3000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 3000
          - path: /ready
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 3000
          # Tudo o mais → frontend (SPA)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
