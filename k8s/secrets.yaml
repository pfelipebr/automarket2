# ⚠️  NÃO versionar este arquivo com valores reais no Git.
#     O deploy.sh gera os secrets automaticamente via `kubectl create secret`.
#     Este arquivo é um template de referência apenas.
#
#     Para aplicar manualmente com seus próprios valores:
#       kubectl apply -f k8s/secrets.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: automarket-secrets
  namespace: automarket
type: Opaque
stringData:
  # Conexão com o PostgreSQL (o host postgres-svc é o Service K8s interno)
  DATABASE_URL: "postgresql://automarket:TROQUE_A_SENHA@postgres-svc:5432/automarket"

  # Redis (sem autenticação no setup local)
  REDIS_URL: "redis://redis-svc:6379"

  # JWT — use uma string aleatória longa (ex: openssl rand -hex 32)
  JWT_SECRET: "TROQUE_POR_STRING_ALEATORIA_64_CHARS"

  # PostgreSQL — deve bater com POSTGRES_PASSWORD abaixo
  POSTGRES_PASSWORD: "TROQUE_A_SENHA"

  # MinIO — credenciais do object storage interno
  MINIO_ACCESS_KEY: "automarket-admin"
  MINIO_SECRET_KEY: "TROQUE_MINIO_SECRET"

  # Email (deixe em branco para desativar no ambiente local)
  SMTP_DSN: ""
